<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button onclick="clearDisplay()" class="span-two btn-red">C</button>
            <button onclick="deleteNumber()" class="btn-blue">DEL</button>
            <button onclick="appendOperator('/')" class="btn-orange">÷</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendOperator('*')" class="btn-orange">×</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendOperator('-')" class="btn-orange">-</button>
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendOperator('+')" class="btn-orange">+</button>
            <button onclick="appendNumber('0')" class="span-two">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button onclick="calculate()" class="btn-orange">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
